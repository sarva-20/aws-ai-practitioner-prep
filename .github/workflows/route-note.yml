name: Classify and Route Note

on:
  push:
    paths:
      - 'inbox/note.md'

jobs:
  classify-and-route:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Classify note and append to domain file
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: python .github/scripts/classify_and_route.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains/ .github/last_routed_line
          git diff --staged --quiet || git commit -m "note: auto-routed to domain"
          git push
